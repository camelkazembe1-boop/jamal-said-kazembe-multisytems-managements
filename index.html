<h2>MULTISYSTEM MANAGEMENT</h2>

<button id="loginBtn" onclick="openLogin()">Login</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<div id="loginMenu" style="display:none; margin-top:20px;">

<div id="g_id_onload"
     data-client_id="418007285423-tm2phevgs4tqjdd35m5jq3t0mkd7putl.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin" data-type="standard"></div>

<br><br>
<button onclick="goBack()">Back</button>

</div>

<script>

function openLogin(){
    document.getElementById("loginMenu").style.display="block";
}

function goBack(){
    document.getElementById("loginMenu").style.display="none";
}

function handleCredentialResponse(response){

    const data = parseJwt(response.credential);

    localStorage.setItem("userLoggedIn","true");

    document.getElementById("loginBtn").style.display="none";
    document.getElementById("logoutBtn").style.display="inline-block";
    document.getElementById("loginMenu").style.display="none";

    saveUser(data.name,data.email);

}

function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');

var jsonPayload = decodeURIComponent(
atob(base64).split('').map(function(c){
return '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2);
}).join('')
);

return JSON.parse(jsonPayload);

}

document.addEventListener("DOMContentLoaded",function(){

if(localStorage.getItem("userLoggedIn")==="true"){
document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";
}

});

function logout(){
localStorage.removeItem("userLoggedIn");
location.reload();
}

</script>


<!-- FIREBASE CLOUD DATABASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "folkloric-air-489411-f9.firebaseapp.com",
projectId: "folkloric-air-489411-f9",
storageBucket: "folkloric-air-489411-f9.appspot.com",
messagingSenderId: "418007285423",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveUser = saveUser;


/* DELETE USERS AFTER 120 HOURS */

async function cleanOldUsers(){

const snapshot = await getDocs(collection(db,"users"));
const now = Date.now();

snapshot.forEach(async (docu)=>{

const data = docu.data();

const loginTime = data.loginTime?.toMillis?.() || Date.now();

const hours = (now-loginTime)/(1000*60*60);

if(hours>120){

await deleteDoc(doc(db,"users",docu.id));

}

});

}



/* GENERATE REG NUMBER */

async function generateRegNumber(){

const snapshot = await getDocs(collection(db,"users"));

let used=[];

snapshot.forEach(docu=>{

used.push(parseInt(docu.data().registration));

});

used.sort((a,b)=>a-b);

let reg=1;

for(let i=0;i<used.length;i++){

if(used[i]!==reg){
break;
}

reg++;

}

return reg.toString().padStart(10,'0');

}



/* SAVE USER */

async function saveUser(name,email){

await cleanOldUsers();

const regNumber = await generateRegNumber();

await addDoc(collection(db,"users"),{

name:name,
email:email,
registration:regNumber,
loginTime:new Date()

});

alert("Registration Number: "+regNumber);

}

</script>
