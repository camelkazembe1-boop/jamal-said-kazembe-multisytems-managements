<button id="logoutBtn" style="display:none;" onclick="logoutUser()">Logout</button>
<script>
// When user logs in successfully
function handleCredentialResponse(response){
localStorage.setItem("registered","yes");
alert("Login successful!");
    document.getElementById("loginArea").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";
document.getElementById("freeBtn").style.display="inline-block";
    document.getElementById("payBtn").style.display="inline-block";
}
// Logout function
function logoutUser(){
localStorage.removeItem("registered");
alert("You logged out");
location.reload();
}
// Check if already logged in
window.onload=function(){

if(localStorage.getItem("registered")=="yes"){

document.getElementById("loginArea").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

let waitTime = localStorage.getItem("waitTime");

if(waitTime && Date.now() < waitTime){

let remaining = Math.floor((waitTime - Date.now())/1000);

document.getElementById("countdown").innerHTML =
"Wait " + remaining + " seconds for next free";

document.getElementById("freeBtn").style.display="none";

}else{

document.getElementById("freeBtn").style.display="inline-block";

}

}

}
    function startFree(){

let seconds = 180;

document.getElementById("freeBtn").disabled = true;

let timer = setInterval(function(){

seconds--;

document.getElementById("countdown").innerHTML =
"Free session: " + seconds + " seconds";

if(seconds <= 0){

clearInterval(timer);

let waitTime = Date.now() + (24*3600*1000);

localStorage.setItem("waitTime", waitTime);

document.getElementById("countdown").innerHTML =
"Free finished. Wait 24 hours.";

}

},1000);

}
    function showPayment(){

closeAllPages();

document.getElementById("paymentBox").style.display="block";

}
 function cancelPayment(){

closeAllPages();

}
function copyMessage(){

let message = document.getElementById("paymentMessage").value;

navigator.clipboard.writeText(message);

alert("Message copied");

}
    function uploadPhoto(){

document.getElementById("photoInput").click();

}
    document.getElementById("photoInput").addEventListener("change", function(){

document.getElementById("submitPhoto").style.display="inline-block";

});

function submitPhoto(){

alert("Photo submitted. Waiting for approval.");

}
    function closeAllPages(){

document.getElementById("paymentBox").style.display="none";

}

</script>
