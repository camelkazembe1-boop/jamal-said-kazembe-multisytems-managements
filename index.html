<!DOCTYPE html>
<html>
<head>
<title>My Website</title>
<style>
body{
    text-align:center;
    font-family:Arial;
}
h1{
    color:red;
}
h2{
    color:green;
}
#logoutBtn{
    background:red;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
</style>
<!-- Google Sign-In Script -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
<br><br>
<!-- Google Login -->
<div id="loginArea">
<div id="g_id_onload"
    data-client_id="418007285423-aubqi40jmhuk6prn0raj4ie3q5500aou.apps.googleusercontent.com"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>
<div class="g_id_signin"
     data-type="standard"
     data-size="large"
     data-theme="outline"
     data-text="sign_in_with"
     data-shape="rectangular">
</div>
</div>
<br>
    <br><br>

<button id="freeBtn" style="display:none;background:green;color:white;padding:10px 20px;border:none;border-radius:5px;font-size:16px;" onclick="startFree()">
FREE GRANTED
</button>

<br><br>

<div id="countdown"></div>
<button id="logoutBtn" style="display:none;" onclick="logoutUser()">Logout</button>
<script>
// When user logs in successfully
function handleCredentialResponse(response){
localStorage.setItem("registered","yes");
alert("Login successful!");
    document.getElementById("loginArea").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";
document.getElementById("freeBtn").style.display="inline-block";
}
// Logout function
function logoutUser(){
localStorage.removeItem("registered");
alert("You logged out");
location.reload();
}
// Check if already logged in
window.onload=function(){

if(localStorage.getItem("registered")=="yes"){

document.getElementById("loginArea").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

let waitTime = localStorage.getItem("waitTime");

if(waitTime && Date.now() < waitTime){

let remaining = Math.floor((waitTime - Date.now())/1000);

document.getElementById("countdown").innerHTML =
"Wait " + remaining + " seconds for next free";

document.getElementById("freeBtn").style.display="none";

}else{

document.getElementById("freeBtn").style.display="inline-block";

}

}

}
    function startFree(){

let seconds = 180;

document.getElementById("freeBtn").disabled = true;

let timer = setInterval(function(){

seconds--;

document.getElementById("countdown").innerHTML =
"Free session: " + seconds + " seconds";

if(seconds <= 0){

clearInterval(timer);

let waitTime = Date.now() + (24*3600*1000);

localStorage.setItem("waitTime", waitTime);

document.getElementById("countdown").innerHTML =
"Free finished. Wait 24 hours.";

}

},1000);

}
</script>
</body>
</html>
